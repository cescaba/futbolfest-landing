<div class="registro-confirmacion" data-futbolfest-registro-confirmacion role="dialog" aria-modal="true" aria-labelledby="registro-confirmacion-title" tabindex="-1" hidden>
	<div class="registro-confirmacion-hero">
		<button type="button" class="registro-confirmacion-close" data-futbolfest-registro-close aria-label="Cerrar confirmación">
			<svg width="23" height="23" viewBox="0 0 23 23" aria-hidden="true" focusable="false">
				<path d="M6 6L17 17M17 6L6 17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
			</svg>
		</button>
	</div>

	<div class="registro-confirmacion-body">
		<img class="registro-confirmacion-separador"
			src="/wp-content/themes/futbolfest-landing/assets/images/separador-hero.png" alt="" aria-hidden="true">
		<p class="registro-confirmacion-label" id="registro-confirmacion-title">¡GRACIAS, <span data-futbolfest-registro-nombre></span>!</p>
		<p class="registro-confirmacion-mensaje">¡Ya eres parte del Fútbol Fest 2026! 🎉</p>
		<p class="registro-confirmacion-title">Pronto te enviaremos más información,
			<span class="registro-confirmacion-title-strong">promociones y sorpresas</span> para que llegues
			listo a jugar los desafíos. ⚽🏆</p>
		<div class="registro-confirmacion-location">
			<div class="registro-confirmacion-location-icon" aria-hidden="true">
				📍
			</div>
			<div class="registro-confirmacion-location-content">
				<p class="registro-confirmacion-location-label">Nos vemos en</p>
				<p class="registro-confirmacion-location-place">Jockey Plaza — Puerta 4, Lima</p>
				<p class="registro-confirmacion-location-date">15, 16 y 17 de Julio 2026</p>
			</div>
		</div>
		<button type="button" class="btn btn-primary registro-confirmacion-reset" data-futbolfest-registro-reset>
			<span>¡A JUGAR! ⚽</span>
		</button>
	</div>
</div>
